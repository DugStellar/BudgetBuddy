# Project-wide Gradle settings.

# Fixes the AndroidX error by enabling modern libraries
android.useAndroidX=true

# Automatically converts older libraries to work with AndroidX
android.enableJetifier=true

# Performance tweaks for your Mac
# Increases memory for Gradle to prevent crashes during build
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enables parallel builds to speed up compile time
org.gradle.parallel=true

# Keeps the Gradle daemon alive for faster subsequent builds
org.gradle.daemon=true

# Android-specific optimization
android.nonTransitiveRClass=true